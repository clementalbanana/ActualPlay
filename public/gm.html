<!DOCTYPE html>
<html lang="fr" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Interface MJ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #1f2937; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #6366f1; }
        .touch-btn { min-width: 44px; min-height: 44px; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body class="bg-gray-800 text-white font-sans h-full overflow-hidden flex flex-col">

<div class="flex-grow overflow-y-auto custom-scrollbar p-4 pb-32 md:pb-4">
    <div class="container mx-auto grid grid-cols-1 lg:grid-cols-3 gap-6">

        <!-- Colonne Gauche : Boss & Joueurs -->
        <div class="lg:col-span-2 space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Boss -->
                <div class="bg-gray-900 rounded-2xl shadow-xl p-6 border border-gray-700">
                    <h2 class="text-sm font-black text-indigo-400 uppercase tracking-widest border-b border-gray-800 pb-3 mb-4">Contrôle du Boss</h2>
                    <div class="space-y-4">
                        <div>
                            <label class="text-[10px] uppercase font-bold text-gray-500">Nom de l'entité</label>
                            <input type="text" id="boss_name" class="mt-1 block w-full bg-gray-800 border border-gray-700 rounded-xl py-3 px-4 focus:ring-2 focus:ring-indigo-500">
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="text-[10px] uppercase font-bold text-gray-500">PV Actuels</label>
                                <input type="number" id="boss_hp_current" class="mt-1 block w-full bg-gray-800 border border-gray-700 rounded-xl py-3 px-4 focus:ring-2 focus:ring-indigo-500">
                            </div>
                            <div>
                                <label class="text-[10px] uppercase font-bold text-gray-500">PV Max</label>
                                <input type="number" id="boss_hp_max" class="mt-1 block w-full bg-gray-800 border border-gray-700 rounded-xl py-3 px-4 focus:ring-2 focus:ring-indigo-500">
                            </div>
                        </div>
                        <div>
                            <label class="text-[10px] uppercase font-bold text-gray-500">Classe d'Armure</label>
                            <input type="number" id="boss_armor" class="mt-1 block w-full bg-gray-800 border border-gray-700 rounded-xl py-3 px-4 focus:ring-2 focus:ring-indigo-500">
                        </div>
                    </div>
                </div>

                <!-- Joueurs -->
                <div class="bg-gray-900 rounded-2xl shadow-xl p-6 border border-gray-700">
                    <h2 class="text-sm font-black text-indigo-400 uppercase tracking-widest border-b border-gray-800 pb-3 mb-4">Joueurs</h2>
                    <ul id="online-players-list" class="space-y-3 max-h-64 overflow-y-auto pr-2 custom-scrollbar"></ul>
                </div>
            </div>

            <!-- Dés (Desktop & Mobile Tablet) -->
            <div class="bg-gray-900 rounded-2xl shadow-xl p-6 border border-gray-700">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-sm font-black text-indigo-400 uppercase tracking-widest">Lancer de Dés</h2>
                    <input type="text" id="gm_roller_name" value="MJ" class="bg-gray-800 border border-gray-700 rounded-lg px-3 py-1 text-xs w-32 focus:ring-2 focus:ring-indigo-500">
                </div>

                <div class="hidden md:grid grid-cols-2 gap-8 mb-6">
                    <div class="space-y-4">
                        <p class="text-[10px] uppercase font-bold text-gray-500 tracking-tighter">Dés</p>
                        <div class="grid grid-cols-4 gap-2">
                            <button data-dice="4" class="dice-btn-gm touch-btn bg-teal-600 rounded-lg font-bold transition-transform active:scale-90">d4</button>
                            <button data-dice="6" class="dice-btn-gm touch-btn bg-teal-600 rounded-lg font-bold transition-transform active:scale-90">d6</button>
                            <button data-dice="8" class="dice-btn-gm touch-btn bg-teal-600 rounded-lg font-bold transition-transform active:scale-90">d8</button>
                            <button data-dice="10" class="dice-btn-gm touch-btn bg-teal-600 rounded-lg font-bold transition-transform active:scale-90">d10</button>
                            <button data-dice="12" class="dice-btn-gm touch-btn bg-teal-600 rounded-lg font-bold transition-transform active:scale-90">d12</button>
                            <button data-dice="20" class="dice-btn-gm touch-btn bg-teal-600 rounded-lg font-bold transition-transform active:scale-90 text-lg">d20</button>
                            <button data-dice="100" class="dice-btn-gm touch-btn bg-teal-600 rounded-lg font-bold transition-transform active:scale-90">d100</button>
                        </div>
                    </div>
                    <div class="space-y-4">
                        <p class="text-[10px] uppercase font-bold text-gray-500 tracking-tighter">Mods</p>
                        <div class="grid grid-cols-4 gap-2">
                            <button data-mod="1" class="mod-btn touch-btn bg-orange-600 hover:bg-orange-700 text-white font-bold rounded-lg transition-transform active:scale-95">+1</button>
                            <button data-mod="-1" class="mod-btn touch-btn bg-orange-600 hover:bg-orange-700 text-white font-bold rounded-lg transition-transform active:scale-95">-1</button>
                            <button data-mod="2" class="mod-btn touch-btn bg-orange-600 hover:bg-orange-700 text-white font-bold rounded-lg transition-transform active:scale-95">+2</button>
                            <button data-mod="-2" class="mod-btn touch-btn bg-orange-600 hover:bg-orange-700 text-white font-bold rounded-lg transition-transform active:scale-95">-2</button>
                            <button data-mod="5" class="mod-btn touch-btn bg-orange-600 hover:bg-orange-700 text-white font-bold rounded-lg transition-transform active:scale-95">+5</button>
                            <button data-mod="-5" class="mod-btn touch-btn bg-orange-600 hover:bg-orange-700 text-white font-bold rounded-lg transition-transform active:scale-95">-5</button>
                            <button data-mod="10" class="mod-btn touch-btn bg-orange-600 hover:bg-orange-700 text-white font-bold rounded-lg transition-transform active:scale-95">+10</button>
                            <button data-mod="-10" class="mod-btn touch-btn bg-orange-600 hover:bg-orange-700 text-white font-bold rounded-lg transition-transform active:scale-95">-10</button>
                        </div>
                    </div>
                </div>

                <div class="bg-gray-800 rounded-2xl p-4 border border-gray-700">
                    <div id="dice-tray" class="flex flex-wrap gap-2 min-h-[44px] mb-4 items-center">
                        <span id="empty-tray-msg" class="text-gray-600 italic text-xs">Aucun dé sélectionné...</span>
                    </div>
                    <div class="flex space-x-3">
                        <button id="btn-roll-tray" class="flex-grow bg-indigo-600 hover:bg-indigo-700 text-white font-black py-3 rounded-xl shadow-lg transition-all active:scale-95 disabled:opacity-50">LANCER</button>
                        <button id="btn-clear-tray" class="bg-red-600 hover:bg-red-700 px-6 rounded-xl transition-all active:scale-95">Vider</button>
                    </div>
                </div>
            </div>

            <div class="bg-gray-900 rounded-2xl shadow-xl p-6 border border-gray-700">
                <div class="flex justify-between items-center mb-4 border-b border-gray-800 pb-2">
                     <h2 class="text-sm font-black text-indigo-400 uppercase tracking-widest">Logs de la session</h2>
                     <button id="reset-dice" class="text-red-500 hover:text-red-400 text-[10px] font-bold uppercase">Reset Dés</button>
                </div>
                <ul id="dice-log" class="space-y-2 max-h-64 overflow-y-auto pr-2 custom-scrollbar"></ul>
            </div>
        </div>

        <!-- Colonne Droite : Galerie -->
        <div class="bg-gray-900 rounded-2xl shadow-xl p-6 border border-gray-700 flex flex-col h-[600px] lg:h-auto">
            <h2 class="text-sm font-black text-indigo-400 uppercase tracking-widest border-b border-gray-800 pb-3 mb-4">Bibliothèque d'Images</h2>

            <form id="upload-form" class="mb-6">
                <div class="relative group">
                    <input type="file" id="image-input" class="hidden" accept="image/*">
                    <label for="image-input" class="flex items-center justify-center w-full py-4 border-2 border-dashed border-gray-700 rounded-xl cursor-pointer hover:border-indigo-500 transition-colors bg-gray-800">
                        <span class="text-xs text-gray-500 group-hover:text-indigo-400 font-bold">AJOUTER UNE IMAGE</span>
                    </label>
                </div>
                <button type="submit" class="mt-3 w-full bg-indigo-600 py-3 rounded-xl text-xs font-black shadow-lg hover:bg-indigo-700 active:scale-95 transition-all">UPLOAD</button>
            </form>

            <div id="image-list" class="grid grid-cols-2 gap-3 overflow-y-auto flex-grow custom-scrollbar pr-1"></div>

            <div class="mt-6 flex space-x-3">
                <button id="btn-show-image" class="flex-grow bg-green-600 py-4 rounded-xl text-xs font-black shadow-lg disabled:opacity-50 active:scale-95 transition-all">PROJETER</button>
                <button id="btn-hide-image" class="bg-red-600 px-6 rounded-xl shadow-lg active:scale-95 transition-all">OFF</button>
            </div>
        </div>
    </div>
</div>

<!-- Mobile Sticky Bottom (MJ) -->
<div class="md:hidden fixed bottom-0 left-0 right-0 bg-gray-900 border-t border-gray-700 p-4 shadow-2xl z-50">
    <div class="flex overflow-x-auto space-x-3 pb-2 custom-scrollbar snap-x">
        <button data-dice="4" class="dice-btn-gm flex-shrink-0 touch-btn bg-teal-600 rounded-xl font-bold snap-center w-14 h-14">d4</button>
        <button data-dice="6" class="dice-btn-gm flex-shrink-0 touch-btn bg-teal-600 rounded-xl font-bold snap-center w-14 h-14">d6</button>
        <button data-dice="8" class="dice-btn-gm flex-shrink-0 touch-btn bg-teal-600 rounded-xl font-bold snap-center w-14 h-14">d8</button>
        <button data-dice="10" class="dice-btn-gm flex-shrink-0 touch-btn bg-teal-600 rounded-xl font-bold snap-center w-14 h-14">d10</button>
        <button data-dice="12" class="dice-btn-gm flex-shrink-0 touch-btn bg-teal-600 rounded-xl font-bold snap-center w-14 h-14">d12</button>
        <button data-dice="20" class="dice-btn-gm flex-shrink-0 touch-btn bg-teal-600 rounded-xl font-bold snap-center w-14 h-14 text-lg">d20</button>
        <button data-mod="1" class="mod-btn-gm flex-shrink-0 touch-btn bg-orange-600 rounded-xl font-bold snap-center w-14 h-14">+1</button>
        <button data-mod="-1" class="mod-btn-gm flex-shrink-0 touch-btn bg-orange-600 rounded-xl font-bold snap-center w-14 h-14">-1</button>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="gm.js"></script>
</body>
</html>
